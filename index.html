<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StreamShelf is a personal media tracker for watchlists, favorites, progress, ratings, and streaming picks." />
  <title>StreamShelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="shell">
    <nav class="nav">
      <div class="brand"><span>SS</span><strong>StreamShelf</strong></div>
      <div class="nav-actions">
        <button class="ghost-btn" id="reset-demo">Reset</button>
        <button class="primary-btn" id="pick-tonight">Pick Tonight</button>
      </div>
    </nav>
    <section class="hero">
      <div>
        <p class="eyebrow">Watchlist command center</p>
        <h1>Find the right thing to watch without losing the plot.</h1>
        <p>Track titles by mood, platform, progress, favorites, and rating in one playful streaming shelf.</p>
      </div>
      <article class="hero-pick" id="tonight-pick"></article>
    </section>
  </header>

  <main class="main">
    <section class="metrics" id="metrics"></section>

    <section class="toolbar">
      <input type="search" id="search" placeholder="Search title, platform, or genre" />
      <select id="genre-filter"><option value="All">All Genres</option></select>
      <select id="platform-filter"><option value="All">All Platforms</option></select>
      <select id="status-filter">
        <option value="All">All Statuses</option>
        <option value="Watchlist">Watchlist</option>
        <option value="Watching">Watching</option>
        <option value="Finished">Finished</option>
        <option value="Favorite">Favorite</option>
      </select>
    </section>

    <section class="spotlight">
      <div>
        <p class="eyebrow">Currently Watching</p>
        <h2 id="spotlight-title">Loading</h2>
        <p id="spotlight-copy"></p>
        <div class="project-tags" id="spotlight-tags"></div>
      </div>
      <div class="progress-panel">
        <span>Episode Progress</span>
        <strong id="spotlight-progress">0%</strong>
        <div class="progress-track"><i id="spotlight-bar"></i></div>
      </div>
    </section>

    <section class="media-grid" id="media-grid"></section>
  </main>

  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-card">
      <button class="close-btn" id="close-drawer" aria-label="Close details">x</button>
      <div id="drawer-content"></div>
    </div>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/mediaService.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
